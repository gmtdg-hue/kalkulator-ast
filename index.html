<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>AST Calculator</title>

<style>

body{

    font-family:Arial,sans-serif;
    background:#f4f6f8;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
    margin:0;

}


.container{

    background:white;

    width:350px;

    padding:25px;

    border-radius:15px;

    box-shadow:
    0 8px 20px rgba(0,0,0,.1);

}


h2{

    text-align:center;

}


input{

    width:100%;
    padding:12px;

    font-size:18px;

    border:1px solid #ccc;

    border-radius:8px;

    box-sizing:border-box;

}


button{

    width:100%;

    margin-top:12px;

    padding:12px;

    border:none;

    border-radius:8px;

    background:#2563eb;

    color:white;

    font-size:18px;

    cursor:pointer;

}


button:hover{

    background:#1d4ed8;

}


.result-box{

    margin-top:20px;

    padding:15px;

    background:#eef2ff;

    border-radius:10px;

}


.label{

    color:#666;

}


.value{

    margin-top:8px;

    font-size:24px;

    font-weight:bold;

}

</style>

</head>


<body>


<div class="container">


<h2>AST Calculator</h2>


<input 
id="expr"
placeholder="Contoh: 5+3*2"
onkeydown="enter(event)">


<button onclick="calc()">

Hitung

</button>



<div class="result-box">


<div class="label">

Hasil Perhitungan

</div>


<div id="hasil" class="value">

-

</div>


</div>


</div>



<script>


// Ganti ini dengan URL server Flask kamu nanti

const API_URL =
"https://gmtdg-hue.github.io/kalkulator-ast/";



function enter(event){

    if(event.key==="Enter"){

        calc();

    }

}



async function calc(){


let input =
document.getElementById("expr").value.trim();


let output =
document.getElementById("hasil");



if(input===""){


    output.textContent =
    "Masukkan ekspresi";


    return;

}



output.textContent =
"Loading...";



try{


let response =
await fetch(API_URL,{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


expression:input


})


});



let data =
await response.json();



if(data.result !== undefined){


output.textContent =
data.result;


}

else{


output.textContent =
"Error dari server";


}



}



catch(error){


console.log(error);


output.textContent =
"Server tidak terhubung";


}


}



</script>


</body>

</html>
