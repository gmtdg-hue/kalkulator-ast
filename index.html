<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AST Calculator</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
    margin:0;
}

.container{

    background:white;
    width:350px;

    padding:25px;

    border-radius:15px;

    box-shadow:
    0 8px 20px rgba(0,0,0,0.1);

}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{

    width:100%;
    padding:12px;

    font-size:18px;

    border:1px solid #ccc;
    border-radius:8px;

    box-sizing:border-box;
}

button{

    width:100%;
    margin-top:12px;

    padding:12px;

    border:none;

    border-radius:8px;

    font-size:18px;

    cursor:pointer;

    background:#2563eb;
    color:white;
}

button:hover{
    background:#1d4ed8;
}

.result-box{

    margin-top:20px;

    padding:15px;

    border-radius:10px;

    background:#eef2ff;

    min-height:60px;
}

.label{

    color:#666;
    font-size:14px;
}

.value{

    margin-top:8px;

    font-size:24px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

    <h2>AST Calculator</h2>

    <input
    id="expr"
    placeholder="Contoh: 5+3*2">

    <button onclick="calc()">
        Hitung
    </button>

    <div class="result-box">

        <div class="label">
            Hasil Perhitungan
        </div>

        <div
        id="hasil"
        class="value">
            -
        </div>

    </div>

</div>

<script>

async function calc(){

    let expression =
    document.getElementById("expr").value;

    try{

        let response =
        await fetch(
        "http://127.0.0.1:5000/calculate",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                expression:expression
            })
        });

        let data =
        await response.json();

        document.getElementById("hasil")
        .innerHTML = data.result;

    }
    catch(error){

        document.getElementById("hasil")
        .innerHTML = "Error";

    }

}

</script>

</body>
</html>
