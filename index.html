<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>AST Calculator</title>


<style>

body{

font-family:Arial,sans-serif;
background:#f4f6f8;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
margin:0;

}


.container{

background:white;

width:350px;

padding:25px;

border-radius:15px;

box-shadow:
0 8px 20px rgba(0,0,0,.1);

}


h2{

text-align:center;

}


input{

width:100%;

padding:12px;

font-size:18px;

box-sizing:border-box;

border:1px solid #ccc;

border-radius:8px;

}


button{

width:100%;

margin-top:12px;

padding:12px;

border:none;

border-radius:8px;

background:#2563eb;

color:white;

font-size:18px;

cursor:pointer;

}



.result-box{

margin-top:20px;

padding:15px;

background:#eef2ff;

border-radius:10px;

}



.value{

font-size:24px;

font-weight:bold;

margin-top:8px;

}


</style>


</head>


<body>


<div class="container">


<h2>AST Calculator</h2>


<input
id="expr"
placeholder="Contoh: 5+3*2"
onkeydown="enter(event)"
>


<button onclick="calc()">

Hitung

</button>


<div class="result-box">


<div>

Hasil:

</div>


<div id="hasil" class="value">

-

</div>


</div>


</div>




<script>


// =====================
// TOKENIZER
// =====================


function tokenize(expr){


return expr.match(/\d+|\+|\-|\*|\/|\(|\)/g);

}



// =====================
// PARSER AST
// =====================


let tokens;

let pos;



function parse(){

return expression();

}



function expression(){


let node =
term();



while(
pos < tokens.length &&
(tokens[pos]=="+" || tokens[pos]=="-")
){


let op=tokens[pos++];



node={

type:"binary",

operator:op,

left:node,

right:term()

};


}


return node;

}



function term(){


let node =
factor();



while(
pos < tokens.length &&
(tokens[pos]=="*" || tokens[pos]=="/")
){


let op=tokens[pos++];


node={

type:"binary",

operator:op,

left:node,

right:factor()

};


}


return node;

}




function factor(){


let token=tokens[pos++];



if(token=="("){


let node =
expression();


pos++; // tutup )


return node;


}



return {

type:"number",

value:Number(token)

};


}




// =====================
// EVALUATOR AST
// =====================



function evaluate(node){


if(node.type=="number"){

return node.value;

}



let a =
evaluate(node.left);


let b =
evaluate(node.right);



if(node.operator=="+")
return a+b;


if(node.operator=="-")
return a-b;


if(node.operator=="*")
return a*b;


if(node.operator=="/")
return a/b;


}




// =====================
// BUTTON
// =====================


function calc(){


let input =
document.getElementById("expr").value;


let hasil =
document.getElementById("hasil");



try{


tokens =
tokenize(input);


pos=0;



let tree =
parse();



let result =
evaluate(tree);



hasil.textContent=result;



}

catch(e){


hasil.textContent=
"Ekspresi salah";


}


}




function enter(e){


if(e.key=="Enter"){

calc();

}


}



</script>


</body>

</html>
